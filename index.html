<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style/index.css">
    <title>FIPE EXPLORER</title>
</head>
<body>
    <div class="fipe-explorer-container">
        <main>
            <header class="header-container" role="banner">
                <div class="text-field">
                    <h2 class="title">Olá, <span class="bold-title">Boa tarde!</span></h2>
                    <span>Busque preços atualizados de forma rápida.</span>
                </div>

                <form class="select-field" role="search" aria-label="Buscar veículo">
                    <label class="sr-only" for="brand">Marca</label>
                    <select id="brand" name="marcas" aria-label="Marca">
                        <option value="">Marca</option>
                    </select>

                    <label class="sr-only" for="model">Modelo</label>
                    <select id="model" name="modelos" aria-label="Modelo">
                        <option value="">Modelo</option>
                    </select>

                    <label class="sr-only" for="year">Ano</label>
                    <select id="year" name="anos" aria-label="Ano">
                        <option value="">Ano</option>
                    </select>
                </form>
            </header>

            <section class="search-result" aria-labelledby="result-title">
                <h2 class="title" id="result-title">Resultado</h2>
                <div class="vehicle-field-result" aria-live="polite">
                    <div class="vehicle">
                        <div class="empty-field">
                            <img height="100%" src="./img/undraw_no_data.svg" alt="Sem dados">
                            <p class="subtitle">Acima, selecione modelos para buscar preços atualizados</p>
                        </div>
                    </div>
                </div>
            </section>

            <section class="vehicle-cards-container" aria-labelledby="fav-title">
                <h2 class="title" id="fav-title">Favoritos</h2>
                <div class="vehicle-fields" aria-live="polite"></div>
            </section>
        </main>
    </div>

    <script src="./index.js" type="module"></script>
</body>
</html>
